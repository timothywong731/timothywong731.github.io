        - heading "Biography" [level=3] [ref=e32]
        - paragraph [ref=e33]: Timothy (Tim) is an IT professional with over ten years of experience in big data, machine learning (ML), generative AI, and analytics applications. His experience spans multiple sectors, including energy, telecommunications, defense and national security. He has a strong, proven track record of delivering complex AI/ML applications in enterprise environments and has led teams of experienced engineers. Tim is also a published researcher in ML and a frequent conference speaker. He is professionally qualified as both a Chartered Statistician (CStat) and a Chartered Engineer (CEng).
        - paragraph [ref=e34]: Prior to his career in data science, Tim studied political science with a focus on quantitative research methods. He has previously worked for various international organisations in the public and third sectors.
